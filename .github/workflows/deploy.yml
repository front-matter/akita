name: Deploy to Staging
on:
  push:
    branches:
      - 'master'
jobs:
  test:
    uses: ./.github/workflows/cypress_tests.yml
    secrets: inherit
  deploy:
    needs: test
    uses: ./.github/workflows/vercel_deploy.yml
    with:
      production: false
      aliases: |
        commons.datacite.vercel.app
        commons.stage.datacite.org
    secrets: inherit
